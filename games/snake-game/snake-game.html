<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Snake Game</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0b1020, #111827);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        padding: 20px;
      }

      .game-box {
        width: 100%;
        max-width: 500px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 22px;
        padding: 22px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin-bottom: 14px;
        font-size: 28px;
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 16px;
        font-size: 18px;
        font-weight: bold;
      }

      canvas {
        width: 100%;
        max-width: 400px;
        background: #000;
        border: 3px solid #00e5ff;
        border-radius: 14px;
        touch-action: none;
      }

      .controls {
        margin-top: 20px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        max-width: 260px;
        margin-left: auto;
        margin-right: auto;
      }

      button {
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: #00e5ff;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }

      .restart-btn {
        margin-top: 15px;
        width: 100%;
        background: #22c55e;
        display: none;
      }

      .empty {
        visibility: hidden;
      }

      .game-over {
        margin-top: 15px;
        color: #ff4d4d;
        font-weight: bold;
        min-height: 24px;
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 22px;
        }

        .top-bar {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="game-box">
      <h1>🐍 Premium Snake Game</h1>

      <div class="top-bar">
        <div>Score: <span id="score">0</span></div>
        <div>Time: <span id="timer">0</span>s</div>
      </div>

      <canvas id="game" width="400" height="400"></canvas>

      <div class="game-over" id="gameOver"></div>

      <button class="restart-btn" id="restartBtn" onclick="restartGame()">
        🔁 Restart Game
      </button>

      <div class="controls">
        <div class="empty"></div>
        <button onclick="setDirection('UP')">⬆</button>
        <div class="empty"></div>

        <button onclick="setDirection('LEFT')">⬅</button>
        <button onclick="setDirection('DOWN')">⬇</button>
        <button onclick="setDirection('RIGHT')">➡</button>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const timerEl = document.getElementById("timer");
      const gameOverEl = document.getElementById("gameOver");
      const restartBtn = document.getElementById("restartBtn");

      const box = 20;

      let snake;
      let direction;
      let score;
      let seconds;
      let running;
      let food;
      let gameLoop;
      let timerLoop;

      function createFood() {
        return {
          x: Math.floor(Math.random() * 20) * box,
          y: Math.floor(Math.random() * 20) * box,
        };
      }

      function startGame() {
        snake = [{ x: 200, y: 200 }];
        direction = "RIGHT";
        score = 0;
        seconds = 0;
        running = true;
        food = createFood();

        scoreEl.innerText = score;
        timerEl.innerText = seconds;
        gameOverEl.innerText = "";
        restartBtn.style.display = "none";

        clearInterval(gameLoop);
        clearInterval(timerLoop);

        gameLoop = setInterval(drawGame, 150);
        timerLoop = setInterval(() => {
          if (running) {
            seconds++;
            timerEl.innerText = seconds;
          }
        }, 1000);
      }

      function restartGame() {
        startGame();
      }

      function setDirection(dir) {
        if (dir === "UP" && direction !== "DOWN") direction = "UP";
        if (dir === "DOWN" && direction !== "UP") direction = "DOWN";
        if (dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
        if (dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowUp") setDirection("UP");
        if (e.key === "ArrowDown") setDirection("DOWN");
        if (e.key === "ArrowLeft") setDirection("LEFT");
        if (e.key === "ArrowRight") setDirection("RIGHT");
      });

      let touchStartX = 0;
      let touchStartY = 0;

      canvas.addEventListener("touchstart", function (e) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      });

      canvas.addEventListener("touchend", function (e) {
        let touchEndX = e.changedTouches[0].clientX;
        let touchEndY = e.changedTouches[0].clientY;

        let dx = touchEndX - touchStartX;
        let dy = touchEndY - touchStartY;

        if (Math.abs(dx) > Math.abs(dy)) {
          if (dx > 0) setDirection("RIGHT");
          else setDirection("LEFT");
        } else {
          if (dy > 0) setDirection("DOWN");
          else setDirection("UP");
        }
      });

      function collision(head, arr) {
        for (let i = 0; i < arr.length; i++) {
          if (head.x === arr[i].x && head.y === arr[i].y) {
            return true;
          }
        }
        return false;
      }

      function stopGame() {
        running = false;
        clearInterval(gameLoop);
        clearInterval(timerLoop);

        gameOverEl.innerText = "Game Over 💀 Restart karke fir se khelo!";
        restartBtn.style.display = "block";
      }

      function drawGame() {
        if (!running) return;

        ctx.clearRect(0, 0, 400, 400);

        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, box, box);

        for (let i = 0; i < snake.length; i++) {
          ctx.fillStyle = i === 0 ? "#00e5ff" : "white";
          ctx.fillRect(snake[i].x, snake[i].y, box, box);
        }

        let headX = snake[0].x;
        let headY = snake[0].y;

        if (direction === "UP") headY -= box;
        if (direction === "DOWN") headY += box;
        if (direction === "LEFT") headX -= box;
        if (direction === "RIGHT") headX += box;

        if (headX < 0 || headX >= 400 || headY < 0 || headY >= 400) {
          stopGame();
          return;
        }

        const newHead = { x: headX, y: headY };

        if (collision(newHead, snake)) {
          stopGame();
          return;
        }

        if (headX === food.x && headY === food.y) {
          score++;
          scoreEl.innerText = score;
          food = createFood();
        } else {
          snake.pop();
        }

        snake.unshift(newHead);
      }

      startGame();
    </script>
  </body>
</html>
