<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Mobile Shooting Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: linear-gradient(to bottom, #071226, #0f172a, #1e293b);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 15px;
        color: white;
      }

      .game-box {
        width: 100%;
        max-width: 900px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 18px;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }

      h1 {
        text-align: center;
        margin-bottom: 15px;
        font-size: clamp(24px, 4vw, 38px);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 15px;
      }

      .card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 12px;
        text-align: center;
        font-weight: bold;
      }

      .card span {
        display: block;
        margin-top: 6px;
        font-size: 20px;
      }

      .game-area {
        position: relative;
        width: 100%;
        height: 65vh;
        min-height: 420px;
        overflow: hidden;
        border-radius: 18px;
        border: 3px solid #22d3ee;
        background: linear-gradient(
          to bottom,
          #38bdf8 0%,
          #2563eb 45%,
          #14532d 45%,
          #166534 100%
        );
        touch-action: none;
      }

      .player {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 55px;
        z-index: 10;
        user-select: none;
      }

      .enemy {
        position: absolute;
        font-size: 40px;
        cursor: pointer;
        user-select: none;
      }

      .bullet {
        position: absolute;
        width: 8px;
        height: 18px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px white;
      }

      .message {
        text-align: center;
        min-height: 35px;
        margin-top: 14px;
        font-weight: bold;
        font-size: 18px;
        color: #4ade80;
      }

      .buttons {
        display: flex;
        gap: 12px;
        margin-top: 15px;
      }

      button {
        flex: 1;
        border: none;
        padding: 14px;
        border-radius: 14px;
        background: #22d3ee;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        transform: scale(1.02);
      }

      @media (max-width: 700px) {
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }

        .buttons {
          flex-direction: column;
        }

        .player {
          font-size: 48px;
        }

        .enemy {
          font-size: 34px;
        }
      }
    </style>
  </head>
  <body>
    <div class="game-box">
      <h1>🎯 Real Shooting Game</h1>

      <div class="stats">
        <div class="card">Score <span id="score">0</span></div>
        <div class="card">Lives <span id="lives">3</span></div>
        <div class="card">Level <span id="level">1</span></div>
        <div class="card">Best <span id="best">0</span></div>
      </div>

      <div class="game-area" id="gameArea">
        <div class="player" id="player">🔫</div>
      </div>

      <div class="message" id="message"></div>

      <div class="buttons">
        <button onclick="restartGame()">🔁 Restart</button>
        <button onclick="bossWave()">🚀 Boss Wave</button>
      </div>
    </div>

    <script>
      const gameArea = document.getElementById("gameArea");
      const player = document.getElementById("player");
      const scoreEl = document.getElementById("score");
      const livesEl = document.getElementById("lives");
      const levelEl = document.getElementById("level");
      const bestEl = document.getElementById("best");
      const messageEl = document.getElementById("message");

      let score = 0;
      let lives = 3;
      let level = 1;
      let running = true;
      let enemyLoop;
      let best = localStorage.getItem("bestShoot") || 0;
      bestEl.innerText = best;

      function createEnemy(type = "normal") {
        if (!running) return;

        const enemy = document.createElement("div");
        enemy.className = "enemy";
        enemy.innerText = type === "boss" ? "👾" : "🎯";

        const maxX = gameArea.clientWidth - 60;
        let x = Math.random() * maxX;
        let y = -50;
        let speed = type === "boss" ? 2 + level : 3 + level;

        enemy.style.left = x + "px";
        enemy.style.top = y + "px";
        gameArea.appendChild(enemy);

        const fall = setInterval(() => {
          if (!running) {
            clearInterval(fall);
            enemy.remove();
            return;
          }

          y += speed;
          enemy.style.top = y + "px";

          if (y > gameArea.clientHeight - 80) {
            clearInterval(fall);
            enemy.remove();
            lives--;
            livesEl.innerText = lives;

            if (lives <= 0) gameOver();
          }
        }, 20);

        enemy.addEventListener("click", () => {
          clearInterval(fall);
          enemy.remove();

          score += type === "boss" ? 5 : 1;
          scoreEl.innerText = score;

          if (score > best) {
            best = score;
            localStorage.setItem("bestShoot", best);
            bestEl.innerText = best;
          }

          if (score % 10 === 0) {
            level++;
            levelEl.innerText = level;
            messageEl.innerText = "🔥 Level Up!";
            setTimeout(() => {
              messageEl.innerText = "";
            }, 1200);
          }
        });
      }

      function startGameLoop() {
        clearInterval(enemyLoop);
        enemyLoop = setInterval(
          () => {
            createEnemy();
          },
          Math.max(900 - level * 80, 300),
        );
      }

      function bossWave() {
        for (let i = 0; i < 4; i++) {
          setTimeout(() => {
            createEnemy("boss");
          }, i * 250);
        }
      }

      function gameOver() {
        running = false;
        clearInterval(enemyLoop);
        messageEl.innerText = "💀 Game Over! Press Restart";
      }

      function restartGame() {
        document.querySelectorAll(".enemy").forEach((e) => e.remove());

        score = 0;
        lives = 3;
        level = 1;
        running = true;

        scoreEl.innerText = score;
        livesEl.innerText = lives;
        levelEl.innerText = level;
        messageEl.innerText = "";

        startGameLoop();
      }

      // Mobile player movement
      let dragging = false;

      function movePlayer(clientX) {
        const rect = gameArea.getBoundingClientRect();
        let x = clientX - rect.left;

        if (x < 30) x = 30;
        if (x > rect.width - 30) x = rect.width - 30;

        player.style.left = x + "px";
      }

      gameArea.addEventListener("mousemove", (e) => {
        movePlayer(e.clientX);
      });

      gameArea.addEventListener("touchmove", (e) => {
        movePlayer(e.touches[0].clientX);
      });

      restartGame();
    </script>
  </body>
</html>
